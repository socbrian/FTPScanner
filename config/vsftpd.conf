listen=YES
listen_ipv6=NO

# Disable anonymous, use local FTP user
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# Chroot user to their home (the scans dir)
chroot_local_user=YES
allow_writeable_chroot=YES
local_root=/srv/scans

# Passive mode ports (open these in your firewall/Proxmox)
pasv_enable=YES
pasv_min_port=10090
pasv_max_port=10100

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
use_localtime=YES

# Accept ASCII uploads (some printers send text-mode)
ascii_upload_enable=YES
ascii_download_enable=NO

# Timeouts
idle_session_timeout=600
data_connection_timeout=120

# Misc
dirmessage_enable=YES
connect_from_port_20=YES
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
ftpd_banner=Scanner FTP Ready
